<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ResolveAI — UI System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* host page */
  body { background: #f1f5f9; font-family: "Inter", system-ui, sans-serif; }
  .topbarspace { height: 60px; flex-shrink: 0; }
  .modeswitch {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 100;
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    padding: 4px;
    display: flex;
    gap: 2px;
    box-shadow: 0 8px 24px -12px rgba(15,23,42,.18);
  }
  .modeswitch button {
    border: 0;
    background: transparent;
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    color: #475569;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
  }
  .modeswitch button.on { background: #0f172a; color: white; }
  .pageframe {
    width: 100%;
    height: calc(100vh - 60px);
    overflow: hidden;
  }
  .topstrip {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    background: #f1f5f9;
    border-bottom: 1px solid #e2e8f0;
  }
  body[data-theme="dark"] .topstrip { background: #050a14; border-bottom-color: #1e293b; }
  body[data-theme="dark"] .role-tabs-static,
  body[data-theme="dark"] .modeswitch-static { background: #0b1220; border-color: #1e293b; color: #cbd5e1; }
  body[data-theme="dark"] .role-tabs-static button,
  body[data-theme="dark"] .modeswitch-static button { color: #cbd5e1; }
  body[data-theme="dark"] .role-tabs-static button.on { background: #1e293b; color: #f1f5f9; }
  body[data-theme="dark"] .modeswitch-static button.on { background: #f1f5f9; color: #0b1220; }
  .modeswitch-static {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    padding: 4px;
    display: inline-flex;
    gap: 2px;
    box-shadow: 0 8px 24px -12px rgba(15,23,42,.18);
  }
  .modeswitch-static button, .role-tabs-static button {
    border: 0;
    background: transparent;
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    color: #475569;
    padding: 7px 12px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .modeswitch-static button.on { background: #0f172a; color: white; }
  .role-tabs-static button { border-radius: 8px; }
  .role-tabs-static button.on { background: #f1f5f9; color: #0f172a; }
  .role-tabs-static .dot { width: 6px; height: 6px; border-radius: 50%; background: #cbd5e1; }
  .role-tabs-static button.on .dot { background: #0284c7; }

  /* Prototype mode role tabs */
  .role-tabs {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 100;
  }
  .role-tabs-static {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 6px;
    display: inline-flex;
    gap: 2px;
    box-shadow: 0 8px 24px -12px rgba(15,23,42,.18);
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 6px;
    display: flex;
    gap: 2px;
    box-shadow: 0 8px 24px -12px rgba(15,23,42,.18);
  }
  .role-tabs button {
    border: 0;
    background: transparent;
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    color: #475569;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .role-tabs button .dot { width: 6px; height: 6px; border-radius: 50%; background: #cbd5e1; }
  .role-tabs button.on { background: #f1f5f9; color: #0f172a; }
  .role-tabs button.on .dot { background: #0284c7; }

  [data-theme="dark"] body, body[data-theme="dark"] { background: #050a14; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="screen-customer.jsx"></script>
<script type="text/babel" src="screen-agent.jsx"></script>
<script type="text/babel" src="screen-manager.jsx"></script>
<script type="text/babel" src="screen-admin.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "customerLayout": "spacious"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [mode, setMode] = React.useState("canvas"); // canvas | prototype
  const [role, setRole] = React.useState("customer");

  // apply theme to body
  React.useEffect(() => {
    document.body.dataset.theme = tweaks.theme;
  }, [tweaks.theme]);

  return (
    <>
      <div className="topstrip">
        <div style={{ minWidth: 120 }} />
        <div className="modeswitch-static">
          <button className={mode === "canvas" ? "on" : ""} onClick={() => setMode("canvas")}>Canvas overview</button>
          <button className={mode === "prototype" ? "on" : ""} onClick={() => setMode("prototype")}>Clickable prototype</button>
        </div>
        <div style={{ minWidth: 120, display: "flex", justifyContent: "flex-end" }}>
          {mode === "prototype" && (
            <div className="role-tabs-static">
              {[
                { id: "customer", label: "Customer" },
                { id: "agent",    label: "Agent" },
                { id: "manager",  label: "Manager" },
                { id: "admin",    label: "Admin" },
              ].map(r => (
                <button key={r.id} className={role === r.id ? "on" : ""} onClick={() => setRole(r.id)}>
                  <span className="dot" />{r.label}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      {mode === "canvas" ? (
        <div style={{ width: "100%", height: "calc(100vh - 60px)", position: "relative" }}>
        <DesignCanvas storageKey="resolveai-canvas" initialZoom={0.5}>
          <DCSection
            id="customer"
            title="Customer — submit a query"
            description="End-user surface. Natural-language box, optional attachment, live AI processing, structured response with extracted intent / entities / route."
          >
            <DCArtboard id="customer-idle" label="Idle / suggestions" width={1200} height={800}>
              <CustomerScreen compact={false} />
            </DCArtboard>
            <DCArtboard id="customer-result" label="After submission · result" width={1200} height={1100}>
              <CustomerScreenDone />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="agent"
            title="Support Agent — ticket queue & detail"
            description="Tier-1/2 workspace. Filterable inbox, AI-classified preview, suggested reply with confidence, similar-ticket retrieval. Agents approve, edit, or override."
          >
            <DCArtboard id="agent-detail" label="Inbox + ticket detail" width={1440} height={920}>
              <AgentScreen />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="manager"
            title="Support Manager — team performance"
            description="KPIs, SLA monitor, hourly volume, per-agent stats including AI-assist rate. Manager spots bottlenecks and coaches the team."
          >
            <DCArtboard id="manager-perf" label="Team performance dashboard" width={1440} height={1000}>
              <ManagerScreen />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="admin"
            title="Business Admin — analytics & insights"
            description="Owner / admin view. Cost-per-ticket, refund exposure, intent mix, top product issues, traffic heatmap — turning support data into business insights."
          >
            <DCArtboard id="admin-overview" label="Business overview" width={1440} height={1100}>
              <AdminScreen />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
        </div>
      ) : (
        <div className="pageframe">
          {role === "customer" && <CustomerScreen compact={tweaks.customerLayout === "compact"} />}
          {role === "agent"    && <AgentScreen />}
          {role === "manager"  && <ManagerScreen />}
          {role === "admin"    && <AdminScreen />}
        </div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio
            label="Mode"
            value={tweaks.theme}
            options={[{ value: "light", label: "Light" }, { value: "dark", label: "Dark" }]}
            onChange={v => setTweak("theme", v)}
          />
        </TweakSection>
        <TweakSection title="Customer screen layout" subtitle="Visible in prototype mode">
          <TweakRadio
            label="Density"
            value={tweaks.customerLayout}
            options={[{ value: "spacious", label: "Spacious" }, { value: "compact", label: "Compact" }]}
            onChange={v => setTweak("customerLayout", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

// Static "done" variant of customer screen for the canvas
const CustomerScreenDone = () => {
  // mount the customer screen and auto-trigger its result via key cycling
  // Simpler: render a forked version with stage forced to "done"
  return <CustomerScreenStage forcedStage="done" />;
};

// Forked customer renderer that accepts a forced stage
const CustomerScreenStage = ({ forcedStage }) => {
  const ref = React.useRef();
  React.useEffect(() => {
    // find the textarea + button and click it; or skip — simpler: just set text and click via timeout
    const root = ref.current;
    if (!root) return;
    // try to find the "Get help" button
    const btn = root.querySelector('button.btn-accent');
    if (btn && forcedStage === "done") {
      btn.click();
      // fast-forward the steps by waiting a moment
    }
  }, [forcedStage]);
  return <div ref={ref} style={{ width: "100%", height: "100%" }}><CustomerScreen /></div>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
